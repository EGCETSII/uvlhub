- hosts: all
  become: true

  tasks:
    - name: Add deadsnakes PPA for installing Python 3.13
      apt_repository:
        repo: ppa:deadsnakes/ppa
        state: present
        update_cache: yes

    - name: Update the system and install Python 3.13 and dependencies
      apt:
        name:
          - python3.13
          - python3.13-venv
          - mariadb-client
        state: present

    - name: Install pip and setuptools for Python 3.13 from source
      shell: |
        wget https://bootstrap.pypa.io/get-pip.py -O /tmp/get-pip.py
        python3.13 /tmp/get-pip.py
      args:
        executable: /bin/bash

    - name: Upgrade pip and setuptools for Python 3.13
      shell: |
        python3.13 -m pip install --upgrade pip setuptools
      args:
        executable: /bin/bash

    - name: Set up the Python 3.13 virtual environment
      command: python3.13 -m venv {{ working_dir }}/vagrant_venv
      args:
        creates: "{{ working_dir }}/vagrant_venv/bin/activate"

    - name: Activate the virtual environment and install dependencies
      shell: |
        source {{ working_dir }}/vagrant_venv/bin/activate
        pip install --upgrade pip
        cd {{ working_dir }}
        pip install -r requirements.txt
        pip install -e ./rosemary
      args:
        executable: /bin/bash