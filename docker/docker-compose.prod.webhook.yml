services:

  web:
    container_name: web_app_container
    image: <your_dockerhub_name>/uvlhub:latest
    env_file:
      - ../.env
    ports:
      - "5000:5000"
    depends_on:
      - db
    build:
      context: ../
      dockerfile: docker/images/Dockerfile.webhook
    restart: always
    volumes:
      - ./entrypoints/production_entrypoint.sh:/workspace/entrypoint.sh
      - ../scripts:/workspace/scripts
      - ../migrations:/workspace/migrations
      - ../uploads:/workspace/uploads
      - ../:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: [ "sh", "-c", "sh /workspace/entrypoint.sh" ]

  db:
    container_name: mariadb_container
    env_file:
      - ../.env
    image: mariadb:12.0.2
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  nginx:
    container_name: nginx_web_server_container
    image: nginx:1.29.1
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/usr/share/nginx/html
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  db_data: